<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qadri Sentinel Console</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#7C3AED',
            secondary: '#00E5FF',
            background: '#050816',
            accent: '#FF3CAC'
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

  
  <!-- React, ReactDOM, Babel, Framer Motion -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background-color: #03050c;
      color: #ffffff;
      font-family: 'JetBrains Mono', monospace;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    /* Futuristic Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 229, 255, 0.3);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 229, 255, 0.8);
    }
    
    .glass-panel {
      background: linear-gradient(135deg, rgba(20, 25, 45, 0.8), rgba(5, 8, 15, 0.9));
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      border-left: 1px solid rgba(255, 255, 255, 0.15);
      border-right: 1px solid rgba(0, 0, 0, 0.6);
      border-bottom: 1px solid rgba(0, 0, 0, 0.6);
      box-shadow: 
        8px 8px 16px rgba(0, 0, 0, 0.7), 
        -4px -4px 12px rgba(255, 255, 255, 0.03),
        inset 1px 1px 2px rgba(255, 255, 255, 0.1),
        inset -1px -1px 2px rgba(0, 0, 0, 0.5);
      border-radius: 16px;
      transform-style: preserve-3d;
    }
    
    .neon-border {
      position: relative;
    }
    .neon-border::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: inherit;
      background: linear-gradient(45deg, #7C3AED, #00E5FF, #FF3CAC);
      z-index: -1;
      opacity: 0.3;
      filter: blur(4px);
    }
    
    .scanline {
      width: 100%;
      height: 100px;
      z-index: 50;
      position: absolute;
      pointer-events: none;
      background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,229,255,0.1) 50%, rgba(0,0,0,0) 100%);
      opacity: 0.5;
      animation: scanline 8s linear infinite;
    }
    
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(1000%); }
    }
    
    .grid-bg {
      background-image: 
        linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
      background-size: 20px 20px;
    }
  </style>
</head>
<body class="grid-bg">
  <div class="scanline"></div>
  <div id="root"></div>

  <!-- Main App Code -->
  <script type="text/babel" src="./app.jsx"></script>
</body>
</html>

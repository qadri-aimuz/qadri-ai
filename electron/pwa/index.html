<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#05070a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Qadri AI Remote</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
</head>

<body>
    <div id="app">
        <!-- Auth Screen -->
        <div id="auth-screen" class="screen active">
            <div class="auth-container">
                <div class="auth-header">
                    <img src="/logo.png" alt="Qadri AI" class="auth-logo">
                    <h1>Qadri AI</h1>
                    <p>Mobile Terminal Bridge</p>
                </div>

                <div id="auth-form" class="auth-form">
                    <div class="input-field">
                        <label>Secure Access Token</label>
                        <input type="text" id="token-input" placeholder="Enter session token..." autocomplete="off">
                    </div>

                    <button id="connect-btn" class="bridge-btn">
                        <span class="btn-text">Initialize Bridge</span>
                        <div class="btn-loader" style="display: none;">
                            <div class="dot-flashing"></div>
                        </div>
                    </button>

                    <div id="auth-error" class="error-toast" style="display: none;"></div>
                </div>

                <footer class="auth-footer">
                    <p>Obtain token from Desktop Settings</p>
                    <div class="status-badge">Encrypted Tunnel</div>
                </footer>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="screen">
            <div class="chat-main">
                <!-- Top Navigation -->
                <nav class="top-nav">
                    <div class="nav-brand">
                        <div class="brand-orb"></div>
                        <div class="brand-info">
                            <span class="brand-name">Qadri AI</span>
                            <span class="brand-status" id="connection-status">
                                <span class="pulse-dot"></span> Active
                            </span>
                        </div>
                    </div>
                    <button id="disconnect-btn" class="nav-action">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10" />
                        </svg>
                    </button>
                </nav>

                <!-- Conversation Area -->
                <div id="messages" class="conversation-area no-scrollbar">
                    <div class="centered-hint">
                        <div class="hint-icon"><img src="/logo.png" width="32"></div>
                        <h3>Terminal Active</h3>
                        <p>Secure remote session established.</p>
                    </div>
                </div>

                <!-- Control Center (Input Area) -->
                <div class="control-center">
                    <div id="ai-thinking" class="thinking-status" style="display: none;">
                        <span class="typing-dots"><span></span><span></span><span></span></span>
                        Qadri AI is analyzing...
                    </div>

                    <div class="input-interface">
                        <div class="input-wrapper">
                            <textarea id="message-input" placeholder="Initiate command..." rows="1"></textarea>

                            <div class="input-actions">
                                <div class="model-picker">
                                    <button id="model-trigger" class="picker-btn">
                                        <span id="active-model-name">Sonnet 4.5</span>
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="3">
                                            <path d="m6 9 6 6 6-6" />
                                        </svg>
                                    </button>
                                    <select id="model-select" class="real-select">
                                        <option value="Claude 4.5 Sonnet">Claude 4.5 Sonnet</option>
                                        <option value="Claude 4.5 Opus">Claude 4.5 Opus</option>
                                        <option value="Gemini 3 Pro">Gemini 3 Pro</option>
                                        <option value="Gemini 3 Flash">Gemini 3 Flash</option>
                                    </select>
                                </div>

                                <div class="primary-actions">
                                    <button id="mic-btn" class="action-btn mic">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                            <line x1="12" y1="19" x2="12" y2="22"></line>
                                        </svg>
                                    </button>

                                    <button id="send-btn" class="action-btn send">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="3" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <line x1="12" y1="19" x2="12" y2="5"></line>
                                            <polyline points="5 12 12 5 19 12"></polyline>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
</body>

</html>
